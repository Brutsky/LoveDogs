<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Love Dogs · Тбилиси</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ============ ТОКЕНЫ: «эмалевая табличка и латунный жетон» ============ */
  :root {
    /* семантика (имена сохранены — используются в JS-шаблонах) */
    --paw:      #e29c33;                /* латунь: собаки, первичные действия */
    --paw-deep: #b87a1d;
    --paw-soft: #f6e7c8;
    --vet:      #1f5b4b;                /* хвоя: места */
    --shop:     #1f5b4b;
    --red:      #d24b3c;                /* потеряшки, опасные действия */
    --yellow:   #d9a13b;
    --green:    #2e7d5b;
    --grey:     #a49a8a;

    --bg:    var(--tg-theme-bg-color, #f8f4ec);
    --text:  var(--tg-theme-text-color, #272219);
    --hint:  var(--tg-theme-hint-color, #877e6e);
    --card:  var(--tg-theme-secondary-bg-color, #ffffff);
    --btnbg: var(--paw);
    --btntx: #2b2008;
    --line:  rgba(39,34,25,.13);
    --line:  color-mix(in srgb, var(--text) 12%, transparent);
    --shadow-s: 0 1px 2px rgba(39,34,25,.06), 0 4px 14px rgba(39,34,25,.06);
    --shadow-m: 0 2px 6px rgba(39,34,25,.10), 0 10px 30px rgba(39,34,25,.14);
    --r-card: 18px;
    --r-ctl: 13px;
    --font-body: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-disp: "Unbounded", "Manrope", sans-serif;
    --tabbar-h: calc(62px + env(safe-area-inset-bottom));
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-body); font-size: 14px; line-height: 1.45; overflow: hidden;
    -webkit-font-smoothing: antialiased; }
  #app { height: 100vh; height: 100dvh; position: relative; }
  button { font-family: var(--font-body); }
  :focus-visible { outline: 2px solid var(--paw); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* ================= КАРТА (главный экран) ================= */
  #map { position: absolute; inset: 0 0 var(--tabbar-h) 0; background: var(--bg); }
  #map-topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 700; padding: 10px 12px 14px;
    pointer-events: none; }
  #map-topbar > * { pointer-events: auto; }
  #tabs { display: flex; gap: 4px; padding: 4px; border-radius: 999px;
    background: rgba(248,244,236,.85);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: var(--shadow-s); border: 1px solid var(--line); }
  .tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 999px; font-size: 13px; font-weight: 700;
    color: var(--hint); transition: background .18s ease, color .18s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; user-select: none; }
  .tab.active { color: #fff; }
  .tab[data-k="dogs"].active { background: var(--paw); color: var(--btntx); }
  .tab[data-k="places"].active { background: var(--vet); }
  #subfilters { display: flex; gap: 6px; margin-top: 9px; overflow-x: auto; padding: 2px; }
  #subfilters::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; font-size: 12.5px; font-weight: 600; padding: 7px 13px; border-radius: 999px;
    background: rgba(248,244,236,.88);
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: var(--hint); cursor: pointer; user-select: none; border: 1px solid var(--line);
    transition: background .15s ease, color .15s ease; }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  #status { position: absolute; top: 108px; left: 50%; transform: translateX(-50%); z-index: 750;
    background: var(--text); color: var(--bg); font-size: 12.5px; font-weight: 600; padding: 8px 16px;
    border-radius: 999px; box-shadow: var(--shadow-m); pointer-events: none; opacity: 0;
    transition: opacity .2s ease; max-width: 86%; text-align: center; }
  #status.show { opacity: 1; }
  #count-badge { position: absolute; bottom: calc(var(--tabbar-h) + 14px); left: 14px; z-index: 600;
    background: rgba(248,244,236,.9);
    background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); color: var(--text); font-size: 12px; font-weight: 700;
    letter-spacing: .01em; padding: 8px 13px; border-radius: 999px; border: 1px solid var(--line);
    box-shadow: var(--shadow-s); }
  #fab { position: absolute; bottom: calc(var(--tabbar-h) + 14px); right: 14px; z-index: 600;
    width: 52px; height: 52px; border-radius: 18px; background: var(--vet); color: #fff; border: none;
    font-size: 26px; font-weight: 400; box-shadow: var(--shadow-m); cursor: pointer; display: none;
    align-items: center; justify-content: center; transition: transform .12s ease; }
  #fab:active { transform: scale(.94); }
  #fab.show { display: flex; }

  /* Маркеры-«жетоны»: эмалевый кружок с латунным ободком */
  .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: var(--shadow-m); }
  .leaflet-popup-content { margin: 13px 15px; font-size: 13.5px; line-height: 1.45; width: 240px !important;
    font-family: var(--font-body); color: var(--text); }
  .marker-pin { width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.25), 0 4px 10px rgba(0,0,0,.22); }
  .marker-pin span { font-size: 14px; }
  .marker-pin.lost { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(210,75,60,.5);} 70% { box-shadow: 0 0 0 13px rgba(210,75,60,0);} 100% { box-shadow: 0 0 0 0 rgba(210,75,60,0);} }
  .marker-pin.closed { opacity: .45; }

  /* Режим выбора точки */
  #pick-pin { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -100%); z-index: 800;
    font-size: 36px; pointer-events: none; display: none; filter: drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
  #pick-bar { position: absolute; left: 14px; right: 14px; bottom: calc(env(safe-area-inset-bottom) + 14px);
    z-index: 800; background: var(--card); border-radius: var(--r-card); padding: 14px;
    box-shadow: var(--shadow-m); display: none; border: 1px solid var(--line); }
  #pick-bar .pick-hint { font-size: 12.5px; color: var(--hint); margin-bottom: 10px; text-align: center; }
  #pick-bar .row { display: flex; gap: 8px; }
  body.picking #pick-pin, body.picking #pick-bar { display: block; }
  body.picking #map-topbar, body.picking #fab, body.picking #count-badge, body.picking #tabbar { display: none; }
  body.picking #map { inset: 0; }

  /* Хром карты — только на экране карты */
  body:not([data-screen="map"]) #map-topbar,
  body:not([data-screen="map"]) #count-badge,
  body:not([data-screen="map"]) #fab,
  body:not([data-screen="map"]) #status { display: none !important; }

  /* ================= ЭКРАНЫ-СПИСКИ ================= */
  .screen { position: absolute; inset: 0 0 var(--tabbar-h) 0; background: var(--bg); z-index: 650;
    overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding: 18px 16px 28px; }
  .screen.show { display: block; }
  .screen h2 { font-family: var(--font-disp); font-size: 19px; font-weight: 600; letter-spacing: -.01em;
    margin: 2px 0 14px; }
  .sec-label { font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: var(--hint); margin: 22px 0 9px; }
  .card { background: var(--card); border-radius: var(--r-card); padding: 14px 15px; margin-bottom: 10px;
    border: 1px solid var(--line); box-shadow: var(--shadow-s); }
  .card.tappable { cursor: pointer; transition: transform .1s ease; }
  .card.tappable:active { transform: scale(.985); }
  .row-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .list-title { font-size: 15px; font-weight: 800; letter-spacing: -.01em; }
  .list-sub { font-size: 12.5px; color: var(--hint); margin-top: 3px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    background: rgba(39,34,25,.07);
    background: color-mix(in srgb, var(--text) 7%, transparent); color: var(--text); }
  .badge.warn { background: rgba(210,75,60,.14);
    background: color-mix(in srgb, var(--red) 14%, transparent); color: var(--red); }
  .badge.ok { background: rgba(46,125,91,.14);
    background: color-mix(in srgb, var(--green) 14%, transparent); color: var(--green); }
  .badge.brand { background: var(--paw-soft); color: var(--paw-deep); }
  .pop-badges, .badges { margin-top: 7px; display: flex; gap: 5px; flex-wrap: wrap; }
  .empty { text-align: center; color: var(--hint); font-size: 13.5px; padding: 34px 12px; }
  .empty .big { font-size: 38px; margin-bottom: 10px; }

  .searchbox { display: flex; align-items: center; gap: 9px; background: var(--card); border-radius: var(--r-ctl);
    padding: 11px 13px; margin-bottom: 10px; border: 1px solid var(--line); }
  .searchbox input { flex: 1; border: none; background: transparent; color: var(--text); font-size: 14px;
    font-family: var(--font-body); outline: none; }
  .searchbox input::placeholder { color: var(--hint); }
  .seg-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 6px; margin-bottom: 6px; }
  .seg-scroll::-webkit-scrollbar { display: none; }
  .seg-scroll .chip { background: var(--card); backdrop-filter: none; -webkit-backdrop-filter: none; }
  .seg-scroll .chip.active { background: var(--text); color: var(--bg); }

  .pop-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
  .pop-row { color: var(--hint); font-size: 13px; }
  .pop-row a { color: var(--vet); font-weight: 600; }

  /* Кнопки */
  .pop-btn { border: none; border-radius: var(--r-ctl); padding: 12px 12px; font-size: 13.5px; font-weight: 800;
    letter-spacing: .01em; background: var(--btnbg); color: var(--btntx); cursor: pointer; width: 100%;
    transition: transform .1s ease, filter .15s ease; }
  .pop-btn:active { transform: scale(.98); filter: brightness(.96); }
  .pop-btn.secondary { background: rgba(39,34,25,.07);
    background: color-mix(in srgb, var(--text) 7%, transparent); color: var(--text); }
  .pop-btn.danger { background: var(--red); color: #fff; }
  .pop-btn.small { width: auto; padding: 9px 13px; font-size: 12.5px; }
  .pop-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .pop-btn { flex: 1; }

  .stars { cursor: pointer; font-size: 24px; letter-spacing: 4px; user-select: none; }
  .stars-small { font-size: 12.5px; }

  /* донорские фильтры */
  #donor-panel { background: var(--card); border-radius: var(--r-card); padding: 13px 14px; margin-bottom: 10px;
    display: none; border: 1px solid var(--line); }
  #donor-panel.show { display: block; }
  #donor-panel .fline { display: flex; align-items: center; justify-content: space-between; padding: 7px 0;
    font-size: 13.5px; font-weight: 600; }
  input[type="range"] { width: 55%; accent-color: var(--paw); }
  .switch { position: relative; width: 44px; height: 26px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-t { position: absolute; inset: 0; background: rgba(39,34,25,.2);
    background: color-mix(in srgb, var(--text) 18%, transparent);
    border-radius: 999px; transition: background .15s; }
  .slider-t:before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .switch input:checked + .slider-t { background: var(--paw); }
  .switch input:checked + .slider-t:before { transform: translateX(18px); }

  /* профиль */
  .avatar { width: 58px; height: 58px; border-radius: 50%; background: var(--paw-soft);
    border: 2px solid color-mix(in srgb, var(--paw) 45%, transparent);
    display: flex; align-items: center; justify-content: center; font-size: 26px; flex: 0 0 auto; }
  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line);
    font-size: 13.5px; gap: 12px; }
  .info-row:last-child { border-bottom: none; }
  .info-row span { color: var(--hint); flex-shrink: 0; }
  .info-row b { text-align: right; word-break: break-word; font-weight: 700; }

  /* ================= НИЖНЯЯ НАВИГАЦИЯ ================= */
  #tabbar { position: absolute; left: 0; right: 0; bottom: 0; height: var(--tabbar-h); z-index: 900;
    background: rgba(248,244,236,.92);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--line); display: flex; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 10.5px; font-weight: 700; letter-spacing: .02em; color: var(--hint);
    cursor: pointer; user-select: none; position: relative; }
  .nav-item .ico { font-size: 21px; line-height: 1; transition: transform .15s ease; }
  .nav-item.active { color: var(--paw-deep); }
  .nav-item.active::before { content: ""; position: absolute; top: 7px; width: 44px; height: 30px;
    border-radius: 999px; background: var(--paw-soft); z-index: -1; }
  .nav-item.active .ico { transform: translateY(-1px); }
  .nav-dot { position: absolute; margin-left: 22px; margin-top: -22px; width: 8px; height: 8px;
    border-radius: 50%; background: var(--red); display: none; border: 1.5px solid var(--bg); }
  .nav-dot.show { display: block; }

  /* ================= НИЖНИЙ ЛИСТ: «паспорт двора» ================= */
  #sheet-overlay { position: fixed; inset: 0; background: rgba(30,25,17,.42); z-index: 1000; display: none; }
  #sheet-overlay.show { display: block; }
  #sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--bg);
    border-radius: 22px 22px 0 0; z-index: 1001;
    padding: 10px 18px calc(18px + env(safe-area-inset-bottom));
    transform: translateY(105%); transition: transform .24s cubic-bezier(.32,.72,.33,1);
    max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    box-shadow: 0 -8px 40px rgba(30,25,17,.25); }
  #sheet.show { transform: translateY(0); }
  #sheet:before { content: ""; display: block; width: 40px; height: 4px; border-radius: 999px;
    background: rgba(39,34,25,.24);
    background: color-mix(in srgb, var(--text) 22%, transparent); margin: 2px auto 14px; }
  #sheet h3 { font-family: var(--font-disp); font-size: 16px; font-weight: 600; letter-spacing: -.01em;
    margin: 0 0 14px; }
  .field { margin-bottom: 11px; }
  .field label { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    color: var(--hint); display: block; margin-bottom: 5px; }
  .field input[type=text], .field input[type=tel], .field input[type=number], .field textarea, .field select {
    width: 100%; padding: 11px 12px; border-radius: var(--r-ctl); border: 1px solid var(--line);
    background: var(--card); color: var(--text); font-size: 14px; font-family: var(--font-body);
    appearance: none; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--paw); box-shadow: 0 0 0 3px color-mix(in srgb, var(--paw) 22%, transparent); }
  .field textarea { resize: vertical; min-height: 64px; }
  .field-row { display: flex; align-items: center; gap: 8px; }
  .pop-actions.vertical { display: flex; flex-direction: column; gap: 8px; }

  /* Шапка карточки собаки — латунный жетон с пробитым отверстием и перфорацией */
  .dog-card-head { display: flex; align-items: center; gap: 13px; margin: 0 -18px 12px;
    padding: 14px 18px 16px;
    background: linear-gradient(160deg, #eeb04a, var(--paw) 55%, var(--paw-deep));
    position: relative; }
  .dog-card-head::before { content: ""; position: absolute; top: 12px; right: 16px; width: 13px; height: 13px;
    border-radius: 50%; background: var(--bg); box-shadow: inset 0 1px 2px rgba(0,0,0,.28); }
  .dog-card-head::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 0;
    border-bottom: 2px dashed color-mix(in srgb, var(--paw-deep) 55%, transparent); }
  .dog-card-head h3 { margin: 0; color: #2b2008; font-family: var(--font-disp); font-size: 17px; }
  .dog-photo { width: 64px; height: 64px; border-radius: 50%; background: #fff7e6 center/cover no-repeat;
    border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.18);
    display: flex; align-items: center; justify-content: center; font-size: 28px; flex: 0 0 auto; }
  .dog-photo.loaded { font-size: 0; }
  .dog-memo { background: rgba(39,34,25,.05);
    background: color-mix(in srgb, var(--text) 5%, transparent); border-radius: var(--r-ctl);
    padding: 10px 12px; font-size: 13px; margin: 9px 0; }
  #geo-status, .geo-note { font-size: 12px; color: var(--hint); margin-top: 5px; }
  .seg-pick { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-pick .opt { padding: 9px 13px; border-radius: var(--r-ctl); background: var(--card);
    border: 1.5px solid var(--line); font-size: 13px; font-weight: 600; cursor: pointer; user-select: none;
    transition: border-color .15s, color .15s, background .15s; }
  .seg-pick .opt.active { border-color: var(--paw); color: var(--paw-deep); font-weight: 800;
    background: var(--paw-soft); }
  .review-item { padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .review-item:last-child { border-bottom: none; }
  .review-item .who { font-weight: 800; }
  .review-item .txt { color: var(--text); margin-top: 2px; }
  .review-item .when { color: var(--hint); font-size: 11.5px; margin-top: 2px; }
</style>
</head>
<body data-screen="map">
<div id="app">
  <!-- ===== Карта — главный экран ===== -->
  <div id="map"></div>
  <div id="map-topbar">
    <div id="tabs">
      <div class="tab active" data-k="dogs">🐕 Собаки</div>
      <div class="tab" data-k="places">📍 Места</div>
    </div>
    <div id="subfilters"></div>
  </div>
  <div id="status"></div>
  <div id="count-badge">—</div>
  <button id="fab">+</button>
  <div id="pick-pin">📍</div>
  <div id="pick-bar">
    <div class="pick-hint">Двигай карту — точка встанет по центру экрана</div>
    <div class="row">
      <button class="pop-btn secondary" onclick="cancelMapPick()">Отмена</button>
      <button class="pop-btn" onclick="confirmMapPick()">✅ Точка здесь</button>
    </div>
  </div>

  <!-- ===== Экраны ===== -->
  <div class="screen" id="screen-dogs">
    <h2>🐾 Собаки</h2>
    <div class="searchbox">🔍<input id="dogSearch" type="text" placeholder="Кличка, порода или № бирки" oninput="renderDogsScreen()"></div>
    <div class="seg-scroll" id="dogSegments"></div>
    <div class="field" style="margin-bottom:8px"><select id="dogRegion" onchange="renderDogsScreen()" style="width:100%;padding:9px 11px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:13.5px"><option value="">🗺 Все районы</option></select></div>
    <div id="donor-panel">
      <div class="fline"><span>⚖️ Вес от <b id="dwLabel">0</b> кг</span>
        <input type="range" min="0" max="60" step="5" value="0" id="donorWeight" oninput="document.getElementById('dwLabel').textContent=this.value; renderDogsScreen()"></div>
      <div class="fline"><span>💉 Только привитые</span>
        <label class="switch"><input type="checkbox" id="donorVacc" onchange="renderDogsScreen()"><span class="slider-t"></span></label></div>
      <div class="fline"><span>🏥 Только стерилизованные</span>
        <label class="switch"><input type="checkbox" id="donorSter" onchange="renderDogsScreen()"><span class="slider-t"></span></label></div>
    </div>
    <div id="dogsList"></div>
  </div>

  <div class="screen" id="screen-sitters">
    <h2>🧑 Догситтеры <span id="sitterCity" style="font-size:13px;color:var(--hint);font-weight:400"></span></h2>
    <div id="sitterSelfSlot"></div>
    <div class="seg-scroll" id="sitterFilters"></div>
    <div id="sittersList"><div class="empty">Загружаю…</div></div>
  </div>

  <div class="screen" id="screen-profile">
    <h2>👤 Профиль</h2>
    <div id="profileBody"><div class="empty">Загружаю…</div></div>
  </div>

  <!-- ===== Нижняя навигация ===== -->
  <div id="tabbar">
    <div class="nav-item active" data-screen="map"><span class="ico">🗺</span>Карта</div>
    <div class="nav-item" data-screen="dogs"><span class="ico">🐾</span>Собаки<span class="nav-dot" id="lostDot"></span></div>
    <div class="nav-item" data-screen="sitters"><span class="ico">🧑</span>Ситтеры</div>
    <div class="nav-item" data-screen="profile"><span class="ico">👤</span>Профиль</div>
  </div>
</div>

<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet"></div>

<script>
// URL рабочего деплоя Apps Script (Manage deployments → тот же URL, что и вебхук бота)
const API_URL = "https://script.google.com/macros/s/AKfycbwuaKkog3Ebjowds_pE4SmxjS63UIlZseNE-NE48KQSYLmNas3gkAqCS1p7TM-0tv1r/exec";
const BOT_USERNAME = "ВАШ_БОТ_USERNAME";

const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const MY_UID = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : '';

// ================== КАРТА ==================
const TBILISI_CENTER = [41.7151, 44.8271];
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(TBILISI_CENTER, 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

let currentLayer = L.layerGroup().addTo(map);
let dataCache = { dogs: null, places: null };
let activeTab = 'dogs';     // слой карты
let subFilter = 'all';
let activeScreen = 'map';
let me = null;              // профиль (getMe)

const PLACE_TYPES = {
  Clinics: { label: 'Ветклиника', icon: '🏥' },
  Shops:   { label: 'Зоомагазин', icon: '🏪' },
  Park:    { label: 'Площадка',   icon: '🌳' },
  Cafe:    { label: 'Кафе',       icon: '☕' },
  Rest:    { label: 'Ресторан',   icon: '🍽' },
  Other:   { label: 'Другое',     icon: '📍' }
};
const AGE_OPTIONS = ['Щенок', 'Молодая', 'Взрослая', 'Пожилая'];
const SEX_OPTIONS = ['Кобель', 'Сука'];
const TRISTATE = ['Да', 'Нет', 'Неизвестно'];
let COMMON_BREEDS = ['Метис', 'Не знаю', 'Дворняжка', 'Лабрадор', 'Немецкая овчарка', 'Хаски', 'Корги', 'Бигль', 'Такса', 'Чихуахуа', 'Золотистый ретривер', 'Шпиц'];
let REGIONS_LIST = [];

function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
function escapeHtml(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function setStatus(text, ms) {
  const el = document.getElementById('status');
  if (!text) { el.classList.remove('show'); return; }
  el.textContent = text; el.classList.add('show');
  if (ms) setTimeout(() => el.classList.remove('show'), ms);
}
function haptic(kind) { try { tg && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred(kind || 'success'); } catch (e) {} }

function ratingColor(r) {
  if (r == null) return cssVar('--grey');
  if (r < 3) return cssVar('--red');
  if (r <= 4) return cssVar('--yellow');
  return cssVar('--green');
}
function pinIcon(kind, item) {
  // Маркер-«жетон»: эмалевый кружок; потеряшки — сигнальный с пульсом, мои — тёмная латунь
  let cls = 'marker-pin', color, emoji;
  if (kind === 'dogs') {
    color = cssVar('--paw');
    if (item.lost) { cls += ' lost'; color = cssVar('--red'); }
    else if (item.mine) color = cssVar('--paw-deep');
    emoji = item.lost ? '🚨' : (item.mine ? '💛' : '🐕');
  } else {
    color = ratingColor(item.rating);
    if (item.closed) cls += ' closed';
    emoji = (PLACE_TYPES[item.type] || PLACE_TYPES.Other).icon;
  }
  return L.divIcon({ className: '', html: `<div class="${cls}" style="background:${color}"><span>${emoji}</span></div>`,
    iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18] });
}

const SUBFILTERS = {
  dogs: [['all','Все'], ['mine','💛 Мои'], ['home','Домашние'], ['street','Уличные'], ['lost','🚨 Потеряшки']],
  places: [['all','Все'], ['Clinics','🏥'], ['Shops','🏪'], ['Park','🌳'], ['Cafe','☕'], ['Rest','🍽'], ['Other','📍']]
};
function renderSubfilters() {
  const box = document.getElementById('subfilters');
  box.innerHTML = '';
  SUBFILTERS[activeTab].forEach(([k, label]) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (subFilter === k ? ' active' : '');
    chip.textContent = label;
    chip.onclick = () => { subFilter = k; renderSubfilters(); renderLayer(); };
    box.appendChild(chip);
  });
  document.getElementById('fab').classList.toggle('show', activeScreen === 'map' && activeTab === 'places');
}

async function loadData(kind, force) {
  if (dataCache[kind] && !force) return dataCache[kind];
  setStatus('Загружаю…');
  try {
    const uid = (kind === 'dogs' && MY_UID) ? MY_UID : '';
    const res = await fetch(`${API_URL}?type=${kind}${uid ? '&uid=' + uid : ''}`);
    const json = await res.json();
    dataCache[kind] = json[kind] || [];
    setStatus(null);
  } catch (err) {
    dataCache[kind] = [];
    setStatus('Не получилось загрузить данные 😔', 2500);
  }
  return dataCache[kind];
}

function filterDogsMap(list) {
  if (subFilter === 'mine') return list.filter(d => d.mine);
  if (subFilter === 'home') return list.filter(d => d.status === 'У владельца' || d.status === 'У опекуна');
  if (subFilter === 'street') return list.filter(d => d.status === 'Уличная');
  if (subFilter === 'lost') return list.filter(d => d.lost);
  return list;
}
function filterPlacesMap(list) {
  if (subFilter === 'all') return list;
  return list.filter(p => (p.type || 'Other') === subFilter);
}

function placePopupHtml(p) {
  const tinfo = PLACE_TYPES[p.type] || PLACE_TYPES.Other;
  const stars = p.rating != null ? '⭐'.repeat(Math.round(p.rating)) + ` ${p.rating} (${p.ratingCount})` : (p.ratingCount ? `мало оценок (${p.ratingCount})` : 'пока без отзывов');
  return `<div class="pop-title">${tinfo.icon} ${escapeHtml(p.name)}</div>
    <div class="pop-row">🏷 ${escapeHtml(p.typeLabel || tinfo.label)}</div>
    ${p.address ? `<div class="pop-row">${escapeHtml(p.address)}</div>` : ''}
    ${p.phone ? `<div class="pop-row">📞 <a href="tel:${escapeAttr(p.phone)}">${escapeHtml(p.phone)}</a></div>` : ''}
    <div class="pop-row">${stars}</div>
    <div class="pop-badges">
      ${p.night ? '<span class="badge">🌙 круглосуточно</span>' : ''}
      ${p.closed ? '<span class="badge warn">⛔ не работает</span>' : ''}
    </div>
    <div class="pop-actions">
      <button class="pop-btn" onclick="openReviewSheet('${p.id}','${escapeAttr(p.name)}','Places')">⭐ Оставить отзыв</button>
      <button class="pop-btn secondary" onclick="showReviews('Places','${p.id}','${escapeAttr(p.name)}')">💬 Читать отзывы</button>
      <button class="pop-btn secondary" onclick='openSuggestSheet(${JSON.stringify(p).replace(/'/g, "&#39;")})'>✏️ Уточнить данные</button>
    </div>`;
}

async function renderLayer() {
  const kind = activeTab;
  const raw = await loadData(kind);
  let list = kind === 'dogs' ? filterDogsMap(raw) : filterPlacesMap(raw);
  currentLayer.clearLayers();
  list.forEach(item => {
    if (!item.lat || !item.lng) return;
    const marker = L.marker([item.lat, item.lng], { icon: pinIcon(kind, item) });
    if (kind === 'dogs') marker.on('click', () => openDogCard(item));
    else marker.bindPopup(placePopupHtml(item));
    currentLayer.addLayer(marker);
  });
  document.getElementById('count-badge').textContent = kind === 'dogs' ? `🐕 ${list.length} собак` : `📍 ${list.length} мест`;
  document.getElementById('lostDot').classList.toggle('show', !!(dataCache.dogs || []).some(d => d.lost));
}

document.querySelectorAll('#tabs .tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.k;
    subFilter = 'all';
    renderSubfilters();
    renderLayer();
  };
});

// ================== НАВИГАЦИЯ ==================
function showScreen(name) {
  activeScreen = name;
  document.body.dataset.screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.querySelectorAll('#tabbar .nav-item').forEach(n => n.classList.toggle('active', n.dataset.screen === name));
  if (name !== 'map') document.getElementById('screen-' + name).classList.add('show');
  document.getElementById('fab').classList.toggle('show', name === 'map' && activeTab === 'places');
  if (name === 'dogs') initDogsScreen();
  if (name === 'sitters') loadSitters();
  if (name === 'profile') loadProfile();
  if (name === 'map') setTimeout(() => map.invalidateSize(), 60);
}
document.querySelectorAll('#tabbar .nav-item').forEach(n => n.onclick = () => showScreen(n.dataset.screen));

// ================== API ==================
async function callApi(action, payload) {
  const initData = tg ? tg.initData : '';
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, initData, payload }) });
    return await res.json();
  } catch (e) { return { ok: false, error: 'network' }; }
}
function openBotDeepLink(payloadStr) {
  const url = `https://t.me/${BOT_USERNAME}?start=${payloadStr}`;
  if (tg && tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url, '_blank');
}
function contactOwner(dogId) { openBotDeepLink('contact_' + dogId); }

// ================== ЛИСТ ==================
function openSheet(html) {
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
function selOpts(arr, cur, emptyLabel) {
  let s = emptyLabel !== undefined ? `<option value="" ${!cur ? 'selected' : ''}>${emptyLabel}</option>` : '';
  return s + arr.map(v => `<option ${v === cur ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('');
}

// ================== ВЫБОР ТОЧКИ НА КАРТЕ ==================
let pickResolve = null;
function pickOnMap(startLatLng) {
  return new Promise(resolve => {
    pickResolve = resolve;
    closeSheet();
    if (activeScreen !== 'map') showScreen('map');
    document.body.classList.add('picking');
    setTimeout(() => map.invalidateSize(), 60);
    if (startLatLng) map.setView(startLatLng, Math.max(map.getZoom(), 15));
  });
}
function confirmMapPick() {
  document.body.classList.remove('picking');
  setTimeout(() => map.invalidateSize(), 60);
  const c = map.getCenter();
  const r = pickResolve; pickResolve = null;
  if (r) r({ lat: +c.lat.toFixed(6), lng: +c.lng.toFixed(6) });
}
function cancelMapPick() {
  document.body.classList.remove('picking');
  setTimeout(() => map.invalidateSize(), 60);
  const r = pickResolve; pickResolve = null;
  if (r) r(null);
}
function getGeo() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve(null), { enableHighAccuracy: true, timeout: 8000 });
  });
}

// ================== КАРТОЧКА СОБАКИ ==================
function findDog(id) { return (dataCache.dogs || []).find(d => d.id.toString() === id.toString()); }

async function openDogCard(d) {
  const isStreet = d.status === 'Уличная';
  const rows = [
    ['🏷 Порода', d.breed || '—'],
    d.tagNumber ? ['🔖 Бирка', d.tagNumber + (d.tagColor ? ' · ' + d.tagColor : '')] : null,
    ['📅 Возраст', d.age || '—'],
    ['⚥ Пол', d.sex || '—'],
    ['📊 Статус', d.status || '—'],
    ['🗺 Район', ((d.city || '') + (d.region ? ', ' + d.region : '')) || '—'],
    d.sterilized ? ['🏥 Стерилизация', d.sterilized] : null,
    d.weightKg ? ['⚖️ Вес', d.weightKg + ' кг'] : null,
    d.vaccinated ? ['💉 Прививки', d.vaccinated] : null,
    d.isDonor ? ['🩸 Донор', d.donorMemo || 'да'] : null
  ].filter(Boolean);
  const badges = [
    d.mine ? '<span class="badge brand">💛 моя</span>' : '',
    d.seekingHome ? '<span class="badge ok">🏡 ищет дом</span>' : '',
    d.isDonor ? '<span class="badge">🩸 донор</span>' : '',
    d.lost ? `<span class="badge warn">🚨 потерялась${d.lostDaysAgo != null ? ' · ' + d.lostDaysAgo + ' дн.' : ''}</span>` : '',
    !d.exactLocation && !d.lost ? '<span class="badge">≈ примерно район</span>' : ''
  ].join('');

  // Роли — зеркало логики бота (showDogCard):
  // домашняя моя / под опекой (в т.ч. уличная, где я записан опекуном) / чужая
  const isHomeMine = d.mine && d.status === 'У владельца';
  const isGuardianMine = d.mine && (d.status === 'У опекуна' || d.status === 'Уличная');
  let actions = '';
  if (d.lat) actions += `<button class="pop-btn secondary" onclick="showDogOnMap('${d.id}')">🗺 Показать на карте</button>`;
  if (d.mine) {
    actions += `<button class="pop-btn" onclick="openDogEditSheet(findDog('${d.id}'))">✏️ Редактировать анкету</button>`;
    if (isHomeMine) {
      actions += `<button class="pop-btn secondary" onclick="walkHereMine('${d.id}')">📍 Гуляем тут</button>`;
      actions += d.isDonor
        ? `<button class="pop-btn secondary" onclick="removeDonor('${d.id}')">🚫 Убрать из доноров</button>`
        : `<button class="pop-btn secondary" onclick="openDonorSheet('${d.id}','${escapeAttr(d.name || '')}')">🩸 Стать донором крови</button>`;
    } else {
      actions += `<button class="pop-btn secondary" onclick="setDogGeoFromCard('${d.id}')">📍 Уточнить геопозицию</button>`;
    }
    if (isGuardianMine) {
      actions += d.seekingHome
        ? `<button class="pop-btn secondary" onclick="toggleSeeking('${d.id}', false)">🏡 Снять «ищет дом»</button>`
        : `<button class="pop-btn secondary" onclick="toggleSeeking('${d.id}', true)">🏡 Отметить «ищет дом»</button>`;
      actions += `<button class="pop-btn secondary" onclick="giveUpCare('${d.id}','${escapeAttr(d.name || '')}')">🙅 Отказаться от опеки</button>`;
    }
    if (!d.lost) actions += `<button class="pop-btn danger" onclick="markLost('${d.id}')">🚨 Собака потерялась</button>`;
    else actions += `<button class="pop-btn" style="background:var(--green)" onclick="markFound('${d.id}')">🎉 Нашлась!</button>`;
    actions += `<button class="pop-btn secondary" onclick="askDeleteDog('${d.id}','${escapeAttr(d.name || '')}')">🗑 Удалить анкету</button>`;
  } else {
    if (d.hasOwner) actions += `<button class="pop-btn" onclick="contactOwner('${d.id}')">✉️ Связаться с хозяином</button>`;
    // Взять опекунство: как в боте — если хозяина нет вовсе или собака не домашняя
    if (!d.hasOwner || d.status !== 'У владельца') {
      actions += `<button class="pop-btn secondary" onclick="takeCare('${d.id}','${escapeAttr(d.name || '')}')">🤲 Взять опекунство</button>`;
    }
    if (isStreet) actions += `<button class="pop-btn secondary" onclick="setDogGeoFromCard('${d.id}')">📍 Уточнить геопозицию</button>`;
  }

  openSheet(`
    <div class="dog-card-head"><div id="dogPhoto" class="dog-photo">🐕</div><h3>${escapeHtml(d.name || 'Собака')}</h3></div>
    <div class="badges">${badges}</div>
    <div class="dog-info">${rows.map(r => `<div class="info-row"><span>${r[0]}</span><b>${escapeHtml(r[1])}</b></div>`).join('')}</div>
    ${d.memo ? `<div class="dog-memo">📝 ${escapeHtml(d.memo)}</div>` : ''}
    <div class="pop-actions vertical">${actions}</div>
  `);

  if (d.photoId) {
    try {
      const r = await fetch(`${API_URL}?type=photoUrl&file_id=${encodeURIComponent(d.photoId)}`);
      const j = await r.json();
      const el = document.getElementById('dogPhoto');
      if (j.ok && j.url && el) { el.style.backgroundImage = `url('${j.url}')`; el.classList.add('loaded'); }
    } catch (e) {}
  }
}

function showDogOnMap(id) {
  const d = findDog(id);
  if (!d || !d.lat) return;
  closeSheet();
  showScreen('map');
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.k === 'dogs'));
  activeTab = 'dogs'; subFilter = 'all';
  renderSubfilters(); renderLayer();
  map.setView([d.lat, d.lng], 16);
}

function openDogEditSheet(d) {
  const breedList = COMMON_BREEDS.slice();
  if (d.breed && breedList.indexOf(d.breed) < 0) breedList.unshift(d.breed);
  openSheet(`
    <h3>Редактировать «${escapeHtml(d.name || '')}»</h3>
    <div class="field"><label>Имя</label><input type="text" id="edName" value="${escapeAttr(d.name || '')}"></div>
    <div class="field"><label>Порода</label>
      <select id="edBreedSel" onchange="document.getElementById('edBreedManual').style.display = this.value==='__manual__' ? 'block':'none'">
        ${selOpts(breedList, d.breed)}
        <option value="__manual__">✍️ Указать текстом…</option>
      </select>
      <input type="text" id="edBreedManual" placeholder="Порода (только буквы и дефис)" style="display:none;margin-top:6px">
    </div>
    <div class="field"><label>Возраст</label><select id="edAge">${selOpts(AGE_OPTIONS, d.age)}</select></div>
    ${REGIONS_LIST.length ? `<div class="field"><label>Район</label><select id="edRegion">${selOpts(REGIONS_LIST, d.region, '—')}</select></div>` : ''}
    <div class="field"><label>Пол</label><select id="edSex">${selOpts(SEX_OPTIONS, d.sex, '—')}</select></div>
    <div class="field"><label>Стерилизация</label><select id="edSter">${selOpts(TRISTATE, d.sterilized || 'Неизвестно')}</select></div>
    <div class="field"><label>Вес (кг)</label><input type="number" step="0.1" id="edWeight" value="${escapeAttr(d.weightKg || '')}"></div>
    <div class="field"><label>Прививки</label><select id="edVacc">${selOpts(TRISTATE, d.vaccinated, '—')}</select></div>
    <div class="field"><label>Заметки</label><textarea id="edMemo">${escapeHtml(d.memo || '')}</textarea></div>
    <button class="pop-btn" onclick="submitDogEdit('${d.id}')">Сохранить</button>
  `);
}
async function submitDogEdit(id) {
  const breedSel = document.getElementById('edBreedSel').value;
  let breed = breedSel === '__manual__' ? document.getElementById('edBreedManual').value.trim() : breedSel;
  if (breedSel === '__manual__' && breed && !/^[A-Za-zА-Яа-яЁё\u10A0-\u10FF\s-]+$/.test(breed)) {
    alert('Порода — только буквы и дефис «-», без цифр и других символов.'); return;
  }
  const changes = {
    name: document.getElementById('edName').value,
    breed,
    age: document.getElementById('edAge').value,
    region: (function(){ const el = document.getElementById('edRegion'); return el ? el.value : undefined; })(),
    sex: document.getElementById('edSex').value,
    sterilized: document.getElementById('edSter').value,
    weightKg: document.getElementById('edWeight').value,
    vaccinated: document.getElementById('edVacc').value,
    memo: document.getElementById('edMemo').value
  };
  const res = await callApi('editDog', { dogId: id, changes });
  closeSheet();
  if (res.ok) { haptic(); dataCache.dogs = null; await renderLayer(); renderDogsScreen(); setStatus('✅ Анкета обновлена', 2000); }
  else alert('Не получилось: ' + (res.error === 'bad breed' ? 'недопустимые символы в породе' : (res.error || '')));
}

function walkHereMine(dogId) {
  // Точка «Гуляем тут» ставится/снимается у ВСЕХ домашних собак владельца в его городе
  openSheet(`
    <h3>📍 Гуляем тут</h3>
    <div class="geo-note" style="margin-bottom:12px">Точка станет видна другим на карте — так соседи смогут познакомиться. Действие применяется ко всем твоим домашним собакам в городе.</div>
    <div class="pop-actions vertical">
      <button class="pop-btn" onclick="walkSetGeo('${dogId}')">📍 Моя текущая позиция</button>
      <button class="pop-btn secondary" onclick="walkPickOnMap()">🗺 Выбрать точку на карте</button>
      <button class="pop-btn secondary" onclick="walkClear()">🙅 Не указывать место (скрыть точку)</button>
    </div>
  `);
}
async function walkApply(payload, okText) {
  const res = await callApi('walkHere', payload);
  if (res.ok) {
    haptic(); closeSheet(); map.closePopup();
    dataCache.dogs = null; await renderLayer(); renderDogsScreen();
    setStatus(okText, 2400);
  } else { setStatus(null); alert('Не получилось: ' + (res.error || '')); }
  return res.ok;
}
async function walkSetGeo(dogId) {
  setStatus('📍 Определяю местоположение…');
  const geo = await getGeo();
  if (!geo) { setStatus(null); openBotDeepLink('walk_' + dogId); return; }
  setStatus('Обновляю точку…');
  await walkApply(geo, '✅ Точка на карте обновлена');
}
async function walkPickOnMap() {
  const choice = await pickOnMap(null);
  if (!choice) return;
  await walkApply(choice, '✅ Точка на карте обновлена');
}
async function walkClear() {

// ================== ДОБАВЛЕНИЕ СОБАКИ ==================
let addDogDraft = null;
function openAddDogSheet(draft) {
  addDogDraft = draft || addDogDraft || { status: 'У владельца' };
  const d = addDogDraft;
  const statuses = [['У владельца','🏠 Домашняя'], ['Уличная','🌳 Уличная'], ['У опекуна','🤝 У опекуна']];
  openSheet(`
    <h3>🐕 Новая собака</h3>
    <div class="field"><label>Кто это?</label>
      <div class="seg-pick" id="adStatus">${statuses.map(([v, l]) =>
        `<div class="opt ${d.status === v ? 'active' : ''}" data-v="${v}">${l}</div>`).join('')}</div>
    </div>
    <div class="field"><label>Кличка *</label><input type="text" id="adName" value="${escapeAttr(d.name || '')}" placeholder="Как зовут?"></div>
    <div class="field"><label>Порода</label>
      <select id="adBreedSel" onchange="document.getElementById('adBreedManual').style.display = this.value==='__manual__' ? 'block':'none'">
        ${selOpts(COMMON_BREEDS, d.breed, '—')}
        <option value="__manual__">✍️ Указать текстом…</option>
      </select>
      <input type="text" id="adBreedManual" placeholder="Порода (только буквы и дефис)" style="display:none;margin-top:6px" value="${escapeAttr(d.breedManual || '')}">
    </div>
    <div class="field"><label>Пол</label><select id="adSex">${selOpts(SEX_OPTIONS, d.sex, '—')}</select></div>
    <div class="field"><label>Возраст</label><select id="adAge">${selOpts(AGE_OPTIONS, d.age, '—')}</select></div>
    ${REGIONS_LIST.length ? `<div class="field"><label>Район (Тбилиси)</label><select id="adRegion">${selOpts(REGIONS_LIST, d.region, '—')}</select></div>` : ''}
    <div class="field"><label>Стерилизация</label><select id="adSter">${selOpts(TRISTATE, d.sterilized || 'Неизвестно')}</select></div>
    <div class="field"><label>Бирка (если есть)</label>
      <div class="field-row">
        <input type="text" id="adTagNum" placeholder="Номер" value="${escapeAttr(d.tagNumber || '')}">
        <input type="text" id="adTagColor" placeholder="Цвет" value="${escapeAttr(d.tagColor || '')}">
      </div>
    </div>
    <div class="field"><label>Заметки</label><textarea id="adMemo" placeholder="Характер, приметы, что важно знать…">${escapeHtml(d.memo || '')}</textarea></div>
    <button class="pop-btn secondary" onclick="addDogPickGeo()">${d.lat ? '📍 Точка выбрана — изменить' : '📍 Отметить точку на карте'}</button>
    <div class="geo-note">${d.lat ? '✅ ' + d.lat + ', ' + d.lng : 'Необязательно: без точки собака встанет по центру района'}</div>
    <div style="height:8px"></div>
    <button class="pop-btn" onclick="submitAddDog()">Сохранить</button>
    <div class="geo-note" style="text-align:center;margin-top:8px">📷 Фото добавляется через бота — открой анкету после сохранения</div>
  `);
  document.querySelectorAll('#adStatus .opt').forEach(o => o.onclick = () => {
    document.querySelectorAll('#adStatus .opt').forEach(x => x.classList.remove('active'));
    o.classList.add('active');
    addDogDraft.status = o.dataset.v;
  });
}
function collectAddDogDraft() {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  addDogDraft = Object.assign(addDogDraft || {}, {
    name: g('adName'), breed: g('adBreedSel'), breedManual: g('adBreedManual'),
    sex: g('adSex'), age: g('adAge'), region: g('adRegion'),
    sterilized: g('adSter'), tagNumber: g('adTagNum'), tagColor: g('adTagColor'), memo: g('adMemo')
  });
}
async function addDogPickGeo() {
  collectAddDogDraft();
  const choice = await pickOnMap(addDogDraft.lat ? [addDogDraft.lat, addDogDraft.lng] : null);
  if (choice) { addDogDraft.lat = choice.lat; addDogDraft.lng = choice.lng; }
  openAddDogSheet();
}
async function submitAddDog() {
  collectAddDogDraft();
  const d = addDogDraft;
  if (!d.name || !d.name.trim()) { alert('Кличка обязательна 🐶'); return; }
  let breed = d.breed === '__manual__' ? (d.breedManual || '').trim() : d.breed;
  if (d.breed === '__manual__' && breed && !/^[A-Za-zА-Яа-яЁё\u10A0-\u10FF\s-]+$/.test(breed)) {
    alert('Порода — только буквы и дефис.'); return;
  }
  const payload = {
    status: d.status, name: d.name.trim(), breed, sex: d.sex, age: d.age,
    region: d.region || '', sterilized: d.sterilized, tagNumber: d.tagNumber,
    tagColor: d.tagColor, memo: d.memo, lat: d.lat || '', lng: d.lng || ''
  };
  const res = await callApi('addDog', payload);
  if (res.ok) {
    haptic(); addDogDraft = null; closeSheet();
    dataCache.dogs = null; await renderLayer(); renderDogsScreen();
    setStatus('✅ Собака добавлена!', 2200);
  } else if (res.error === 'limit') alert('Достигнут лимит анкет на одного человека.');
  else alert('Не получилось: ' + (res.error || ''));
}

// ================== ЭКРАН «СОБАКИ» ==================
let dogSegment = 'mine';
const DOG_SEGMENTS = [['mine','💛 Мои'], ['lost','🚨 Потеряшки'], ['seeking','🏡 Ищут дом'], ['donors','🩸 Доноры'], ['all','Все']];
async function initDogsScreen() {
  await loadData('dogs');
  renderDogSegments();
  renderDogsScreen();
}
function renderDogSegments() {
  const box = document.getElementById('dogSegments');
  box.innerHTML = '';
  DOG_SEGMENTS.forEach(([k, label]) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (dogSegment === k ? ' active' : '');
    chip.textContent = label;
    chip.onclick = () => { dogSegment = k; renderDogSegments(); renderDogsScreen(); };
    box.appendChild(chip);
  });
}
function fillRegionFilter() {
  const sel = document.getElementById('dogRegion');
  if (sel.options.length > 1 || !REGIONS_LIST.length) return;
  REGIONS_LIST.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o); });
}
function renderDogsScreen() {
  fillRegionFilter();
  const list = dataCache.dogs || [];
  const q = (document.getElementById('dogSearch').value || '').trim().toLowerCase();
  const reg = document.getElementById('dogRegion').value;
  document.getElementById('donor-panel').classList.toggle('show', dogSegment === 'donors');
  let filtered = list;
  if (dogSegment === 'mine') filtered = list.filter(d => d.mine);
  if (dogSegment === 'lost') filtered = list.filter(d => d.lost);
  if (dogSegment === 'seeking') filtered = list.filter(d => d.seekingHome);
  if (dogSegment === 'donors') {
    const minW = +document.getElementById('donorWeight').value;
    const vacc = document.getElementById('donorVacc').checked;
    const ster = document.getElementById('donorSter').checked;
    filtered = list.filter(d => d.isDonor
      && (Number(d.weightKg) || 0) >= minW
      && (!vacc || d.vaccinated === 'Да')
      && (!ster || d.sterilized === 'Да'));
  }
  if (reg) filtered = filtered.filter(d => d.region === reg);
  if (q) filtered = filtered.filter(d =>
    (d.name || '').toLowerCase().includes(q) ||
    (d.breed || '').toLowerCase().includes(q) ||
    (d.tagNumber || '').toString().toLowerCase() === q);

  const box = document.getElementById('dogsList');
  const addBtn = dogSegment === 'mine'
    ? `<button class="pop-btn" style="margin-bottom:12px" onclick="openAddDogSheet({status:'У владельца'})">➕ Добавить собаку</button>` : '';
  if (!filtered.length) {
    const msgs = { mine: 'У тебя пока нет анкет — добавь первую! 🐶', lost: 'Потеряшек нет — и это отлично 🎉',
      seeking: 'Сейчас никто не ищет дом', donors: 'По этим фильтрам никого — попробуй ослабить', all: 'Ничего не нашлось' };
    box.innerHTML = addBtn + `<div class="empty"><div class="big">🐾</div>${q ? 'По запросу ничего не нашлось' : msgs[dogSegment]}</div>`;
    return;
  }
  const statusIco = s => s === 'У владельца' ? '🏠' : (s === 'У опекуна' ? '🤝' : '🌳');
  box.innerHTML = addBtn + filtered.map(d => `
    <div class="card tappable" onclick="openDogCard(findDog('${d.id}'))">
      <div class="row-between">
        <div>
          <div class="list-title">${d.lost ? '🚨 ' : ''}${escapeHtml(d.name || 'Без клички')}</div>
          <div class="list-sub">${statusIco(d.status)} ${escapeHtml(d.status)} · ${escapeHtml(d.breed || 'порода не указана')}${d.region ? ' · ' + escapeHtml(d.region) : (d.city && d.city !== 'Тбилиси' ? ' · ' + escapeHtml(d.city) : '')}</div>
        </div>
        <div style="font-size:22px">${d.mine ? '💛' : '🐕'}</div>
      </div>
      <div class="badges">
        ${d.seekingHome ? '<span class="badge ok">🏡 ищет дом</span>' : ''}
        ${d.isDonor ? '<span class="badge">🩸 донор ' + (d.weightKg ? d.weightKg + ' кг' : '') + '</span>' : ''}
        ${d.lost ? `<span class="badge warn">потерялась${d.lostDaysAgo != null ? ' · ' + d.lostDaysAgo + ' дн.' : ''}</span>` : ''}
        ${d.tagNumber ? '<span class="badge">🔖 ' + escapeHtml(d.tagNumber) + '</span>' : ''}
        ${!d.lat ? '<span class="badge">🗺 нет на карте — без координат</span>' : ''}
      </div>
    </div>`).join('');
}

// ================== ЭКРАН «СИТТЕРЫ» ==================
// Форматы услуг: ключ ↔ столбцы I/J/K листа DogSitter
const SITTER_SERVICES = {
  justWalking: { icon: '🚶', short: 'Выгул', label: 'Приходящий выгул',
    hint: 'Ситтер приходит в установленное время: погулять с собакой и насыпать корм' },
  ownPlace:    { icon: '🏠', short: 'У ситтера', label: 'Передержка у ситтера',
    hint: 'Собака живёт у ситтера дома' },
  withLiving:  { icon: '🛋', short: 'С проживанием', label: 'Ситтер с проживанием',
    hint: 'Ситтер живёт на территории собаки, пока вас нет' }
};
let sittersCache = null;   // список активных ситтеров моего города
let mySitterProfile = null; // моя анкета (даже неактивная) — для формы редактирования
let sitterFilter = 'all';
function openTgUser(username) {
  if (!username) return;
  const url = 'https://t.me/' + username;
  if (tg && tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url, '_blank');
}
async function loadSitters(force) {
  if (sittersCache && !force) { renderSitters(); return; }
  const res = await callApi('getSitters', {});
  sittersCache = res.ok ? res.sitters : [];
  mySitterProfile = res.ok ? res.mine : null;
  document.getElementById('sitterCity').textContent = res.ok && res.city ? '· ' + res.city : '';
  renderSitters(res.ok ? null : (res.error || 'ошибка'));
}
function renderSitterFilters() {
  const box = document.getElementById('sitterFilters');
  box.innerHTML = '';
  const opts = [['all', 'Все']].concat(Object.keys(SITTER_SERVICES).map(k => [k, SITTER_SERVICES[k].icon + ' ' + SITTER_SERVICES[k].short]));
  opts.forEach(([k, label]) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (sitterFilter === k ? ' active' : '');
    chip.textContent = label;
    chip.onclick = () => { sitterFilter = k; renderSitters(); };
    box.appendChild(chip);
  });
}
function sitterServiceBadges(s) {
  return Object.keys(SITTER_SERVICES)
    .filter(k => s[k])
    .map(k => `<span class="badge brand">${SITTER_SERVICES[k].icon} ${SITTER_SERVICES[k].label}</span>`)
    .join('');
}
function renderSitters(err) {
  renderSitterFilters();
  const selfSlot = document.getElementById('sitterSelfSlot');
  const box = document.getElementById('sittersList');
  if (err) { box.innerHTML = `<div class="empty">Не получилось загрузить (${escapeHtml(err)})</div>`; return; }
  selfSlot.innerHTML = (mySitterProfile && mySitterProfile.active)
    ? `<div class="btn-row" style="margin-bottom:12px">
        <button class="pop-btn secondary" onclick="openBecomeSitterSheet(true)">✏️ Моя анкета</button>
        <button class="pop-btn secondary" onclick="stopSitter()">🚫 Больше не ситтер</button>
      </div>`
    : `<button class="pop-btn" style="margin-bottom:12px" onclick="openBecomeSitterSheet(!!mySitterProfile)">🙋 ${mySitterProfile ? 'Вернуться в ситтеры' : 'Стать догситтером'}</button>`;
  let list = sittersCache || [];
  if (sitterFilter !== 'all') list = list.filter(s => s[sitterFilter]);
  if (!list.length) {
    box.innerHTML = `<div class="empty"><div class="big">🧑</div>${sitterFilter === 'all' ? 'Ситтеров пока нет — стань первым!' : 'В этом формате пока никто не работает'}</div>`;
    return;
  }
  box.innerHTML = list.map(s => {
    const rating = s.rating != null ? `⭐ ${s.rating} (${s.ratingCount})` : (s.ratingCount ? `мало оценок (${s.ratingCount})` : 'без оценок');
    return `<div class="card">
      <div class="row-between">
        <div class="list-title">${s.self ? '💛 ' : '🙋 '}${escapeHtml(s.name || 'Ситтер')}</div>
        <span class="badge">${rating}</span>
      </div>
      <div class="badges">${sitterServiceBadges(s)}</div>
      ${s.desc ? `<div class="list-sub" style="margin-top:6px">${escapeHtml(s.desc)}</div>` : ''}
      ${s.price ? `<div class="list-sub">💰 ${escapeHtml(s.price)}</div>` : ''}
      <div class="btn-row" style="margin-top:10px">
        ${s.tg && !s.self ? `<button class="pop-btn" onclick="openTgUser('${escapeAttr(s.tg)}')">✍️ Написать</button>` : ''}
        ${s.phone ? `<a class="pop-btn secondary" style="text-align:center;text-decoration:none;line-height:1.3" href="tel:${escapeAttr(s.phone)}">📞</a>` : ''}
        ${!s.self ? `<button class="pop-btn secondary" onclick="openReviewSheet('${s.id}','${escapeAttr(s.name || 'Ситтер')}','DogSitter')">⭐ Оценить</button>` : ''}
        ${s.ratingCount ? `<button class="pop-btn secondary small" onclick="showReviews('DogSitter','${s.id}','${escapeAttr(s.name || '')}')">💬 Отзывы</button>` : ''}
      </div>
    </div>`;
  }).join('');
}
function openBecomeSitterSheet(isEdit) {
  const cur = isEdit ? (mySitterProfile || {}) : {};
  const svcToggles = Object.keys(SITTER_SERVICES).map(k => `
    <div class="fline" style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:7px 0">
      <div>
        <div style="font-size:13.5px;font-weight:600">${SITTER_SERVICES[k].icon} ${SITTER_SERVICES[k].label}</div>
        <div style="font-size:11.5px;color:var(--hint)">${SITTER_SERVICES[k].hint}</div>
      </div>
      <label class="switch" style="flex:0 0 auto;margin-top:4px"><input type="checkbox" id="svc_${k}" ${cur[k] ? 'checked' : ''}><span class="slider-t"></span></label>
    </div>`).join('');
  openSheet(`
    <h3>${isEdit ? '✏️ Моя анкета ситтера' : '🙋 Стать догситтером'}</h3>
    <div class="field"><label>Форматы работы * (хотя бы один)</label>
      <div style="background:var(--card);border-radius:12px;padding:4px 12px">${svcToggles}</div>
    </div>
    <div class="field"><label>Пара слов о себе и опыте *</label>
      <textarea id="sitBio" placeholder="Например: гуляю с собаками 3 года, живу в Ваке, умею с тревожными…">${escapeHtml(cur.desc || '')}</textarea></div>
    <div class="field"><label>Телефон для связи</label><input type="tel" id="sitPhone" value="${escapeAttr(cur.phone || (me && me.profile && me.profile.tel !== 'Не указан' ? me.profile.tel : '') || '')}" placeholder="+995…"></div>
    <div class="field"><label>Цена / условия</label><input type="text" id="sitPrice" value="${escapeAttr(cur.price || '')}" placeholder="Например: 20 лари за прогулку"></div>
    <button class="pop-btn" onclick="submitBecomeSitter()">${isEdit ? 'Сохранить' : 'Опубликовать анкету'}</button>
  `);
}
async function submitBecomeSitter() {
  const bio = document.getElementById('sitBio').value.trim();
  if (!bio) { alert('Расскажи немного о себе — это твоя визитка.'); return; }
  const services = {};
  Object.keys(SITTER_SERVICES).forEach(k => services[k] = document.getElementById('svc_' + k).checked);
  if (!services.justWalking && !services.ownPlace && !services.withLiving) {
    alert('Выбери хотя бы один формат работы — так хозяевам понятнее.'); return;
  }
  const res = await callApi('becomeSitter', Object.assign({
    bio, phone: document.getElementById('sitPhone').value.trim(),
    price: document.getElementById('sitPrice').value.trim()
  }, services));
  closeSheet();
  if (res.ok) { haptic(); sittersCache = null; loadSitters(true); setStatus('✅ Анкета опубликована!', 2200); }
  else alert('Не получилось: ' + (res.error === 'service required' ? 'выбери хотя бы один формат' : (res.error || '')));
}
async function stopSitter() {
  if (!confirm('Убрать себя из списка ситтеров? Данные сохранятся — вернуться можно в любой момент.')) return;
  const res = await callApi('stopSitter', {});
  if (res.ok) { haptic(); sittersCache = null; loadSitters(true); }
  else alert('Не получилось: ' + (res.error || ''));
}

// ================== ОТЗЫВЫ ==================
function openReviewSheet(id, name, itemType) {
  openSheet(`
    <h3>Отзыв — «${escapeHtml(name)}»</h3>
    <div class="field"><label>Оценка</label><div class="stars" id="starsPick">☆☆☆☆☆</div></div>
    <div class="field"><textarea id="reviewText" placeholder="Коротко о впечатлениях (необязательно)"></textarea></div>
    <button class="pop-btn" onclick="submitReview('${id}','${itemType}')">Отправить</button>
  `);
  const starsEl = document.getElementById('starsPick');
  starsEl.onclick = (e) => {
    const rect = starsEl.getBoundingClientRect();
    const rating = Math.max(1, Math.min(5, Math.ceil(((e.clientX - rect.left) / rect.width) * 5)));
    starsEl.textContent = '⭐'.repeat(rating) + '☆'.repeat(5 - rating);
    starsEl.dataset.rating = rating;
  };
}
async function submitReview(id, itemType) {
  const rating = parseInt(document.getElementById('starsPick').dataset.rating || '0', 10);
  if (!rating) { alert('Поставь оценку от 1 до 5 ⭐'); return; }
  const text = document.getElementById('reviewText').value;
  const res = await callApi('addReview', { type: itemType, id, rating, text });
  closeSheet();
  if (res.ok) {
    haptic();
    if (itemType === 'DogSitter') { sittersCache = null; loadSitters(true); }
    else { dataCache.places = null; renderLayer(); }
    setStatus('✅ Спасибо за отзыв!', 2000);
  } else alert('Не получилось: ' + (res.error === 'self review' ? 'себя оценивать нельзя 🙂' : (res.error || '')));
}
async function showReviews(itemType, id, name) {
  openSheet(`<h3>💬 Отзывы — «${escapeHtml(name)}»</h3><div class="empty">Загружаю…</div>`);
  const res = await callApi('getReviews', { type: itemType, id });
  const items = res.ok ? (res.reviews || []) : [];
  openSheet(`
    <h3>💬 Отзывы — «${escapeHtml(name)}»</h3>
    ${items.length ? items.map(r => `
      <div class="review-item">
        <div class="row-between"><span class="who">${escapeHtml(r.username || 'Аноним')}</span>
          <span class="stars-small">${'⭐'.repeat(r.rating)}</span></div>
        ${r.text ? `<div class="txt">${escapeHtml(r.text)}</div>` : ''}
        <div class="when">${escapeHtml(r.date || '')}</div>
      </div>`).join('') : '<div class="empty">Пока пусто — будь первым 🙂</div>'}
  `);
}

// ================== МЕСТА: уточнение / добавление ==================
let pendingGeo = null;
function openSuggestSheet(current) {
  const id = current.id, name = current.name;
  const typeOpts = Object.keys(PLACE_TYPES).map(tk =>
    `<option value="${PLACE_TYPES[tk].label}" ${current.typeLabel === PLACE_TYPES[tk].label ? 'selected' : ''}>${PLACE_TYPES[tk].icon} ${PLACE_TYPES[tk].label}</option>`).join('');
  map.closePopup();
  openSheet(`
    <h3>Уточнить данные — «${escapeHtml(name)}»</h3>
    <div class="field"><label>Название</label><input type="text" id="sugName" value="${escapeAttr(current.name || '')}"></div>
    <div class="field"><label>Тип места</label><select id="sugType">${typeOpts}</select></div>
    <div class="field"><label>Адрес</label><input type="text" id="sugAddress" value="${escapeAttr(current.address || '')}"></div>
    <div class="field"><label>Телефон</label><input type="tel" id="sugPhone" value="${escapeAttr(current.phone || '')}"></div>
    <div class="field field-row"><input type="checkbox" id="sugNight" ${current.night ? 'checked' : ''}><label style="margin:0">Круглосуточно</label></div>
    <div class="field field-row"><input type="checkbox" id="sugClosed" ${current.closed ? 'checked' : ''}><label style="margin:0">Сейчас не работает</label></div>
    <button class="pop-btn secondary" onclick="suggestPickGeo('${id}')">📍 Поправить точку на карте</button>
    <div id="geo-status"></div>
    <button class="pop-btn" onclick="submitSuggest('${id}')">Отправить на проверку</button>
    <button class="pop-btn danger" style="margin-top:8px" onclick="submitDelete('${id}','${escapeAttr(name)}')">🗑️ Предложить удалить место</button>
  `);
}
async function suggestPickGeo(id) {
  const vals = collectSuggestVals();
  const p = (dataCache.places || []).find(x => x.id.toString() === id.toString());
  const choice = await pickOnMap(p && p.lat ? [p.lat, p.lng] : null);
  const cur = Object.assign({}, p, vals, { id, night: vals.night, closed: vals.closed, typeLabel: vals.type });
  openSuggestSheet(cur);
  if (choice) { pendingGeo = choice; document.getElementById('geo-status').textContent = '✅ Новая точка выбрана'; }
}
function collectSuggestVals() {
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  return {
    name: g('sugName'), type: g('sugType'), address: g('sugAddress'), phone: g('sugPhone'),
    night: !!(document.getElementById('sugNight') || {}).checked,
    closed: !!(document.getElementById('sugClosed') || {}).checked
  };
}
async function submitSuggest(id) {
  const changes = collectSuggestVals();
  if (pendingGeo) changes.mapsLink = `https://www.google.com/maps?q=${pendingGeo.lat},${pendingGeo.lng}`;
  const res = await callApi('suggestEdit', { type: 'Places', id, changes });
  pendingGeo = null;
  closeSheet();
  if (res.ok) { haptic(); setStatus('✅ Отправлено модератору', 2400); }
  else alert('Не получилось: ' + (res.error || ''));
}
async function submitDelete(id, name) {
  if (!confirm(`Предложить удалить «${name}»? Место скроется после подтверждения модератором.`)) return;
  const res = await callApi('suggestEdit', { type: 'Places', id, changes: { _delete: true } });
  closeSheet();
  if (res.ok) { haptic(); setStatus('Запрос на удаление отправлен', 2400); }
  else alert('Не получилось: ' + (res.error || ''));
}

document.getElementById('fab').onclick = () => {
  const typeOpts = Object.keys(PLACE_TYPES).map(tk =>
    `<option value="${tk}" ${(subFilter !== 'all' && subFilter === tk) ? 'selected' : ''}>${PLACE_TYPES[tk].icon} ${PLACE_TYPES[tk].label}</option>`).join('');
  openSheet(`
    <h3>Добавить место</h3>
    <div class="field"><label>Тип места</label><select id="addType">${typeOpts}</select></div>
    <div class="field"><label>Название *</label><input type="text" id="addName" placeholder="Название"></div>
    <div class="field"><label>Адрес</label><input type="text" id="addAddress" placeholder="Улица, дом"></div>
    <div class="field"><label>Телефон</label><input type="tel" id="addPhone" placeholder="+995…"></div>
    <div class="field field-row"><input type="checkbox" id="addNight"><label style="margin:0">Круглосуточно</label></div>
    <button class="pop-btn secondary" onclick="addPlacePickGeo()">📍 Отметить точку на карте</button>
    <div id="geo-status">${pendingGeo ? '✅ Точка выбрана' : ''}</div>
    <button class="pop-btn" onclick="submitAddPlace()">Отправить на модерацию</button>
  `);
};
let addPlaceDraft = null;
async function addPlacePickGeo() {
  addPlaceDraft = {
    type: document.getElementById('addType').value, name: document.getElementById('addName').value,
    address: document.getElementById('addAddress').value, phone: document.getElementById('addPhone').value,
    night: document.getElementById('addNight').checked
  };
  const choice = await pickOnMap(null);
  if (choice) pendingGeo = choice;
  document.getElementById('fab').onclick();
  if (addPlaceDraft) {
    document.getElementById('addType').value = addPlaceDraft.type;
    document.getElementById('addName').value = addPlaceDraft.name;
    document.getElementById('addAddress').value = addPlaceDraft.address;
    document.getElementById('addPhone').value = addPlaceDraft.phone;
    document.getElementById('addNight').checked = addPlaceDraft.night;
    addPlaceDraft = null;
  }
};
async function submitAddPlace() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('Укажи название'); return; }
  const payload = {
    type: document.getElementById('addType').value, name,
    address: document.getElementById('addAddress').value,
    phone: document.getElementById('addPhone').value,
    night: document.getElementById('addNight').checked
  };
  if (pendingGeo) { payload.lat = pendingGeo.lat; payload.lng = pendingGeo.lng; }
  const res = await callApi('addPlace', payload);
  pendingGeo = null;
  closeSheet();
  if (res.ok) { haptic(); setStatus('✅ Появится на карте после проверки', 2600); }
  else alert('Не получилось: ' + (res.error || ''));
}

// ================== ПРОФИЛЬ ==================
async function loadProfile(force) {
  if (me && !force) { renderProfile(); return; }
  const res = await callApi('getMe', {});
  if (!res.ok) { document.getElementById('profileBody').innerHTML = `<div class="empty">Не получилось загрузить профиль (${escapeHtml(res.error || '')})</div>`; return; }
  me = res;
  renderProfile();
}
function renderProfile() {
  const p = me.profile;
  const langNames = { RU: '🇷🇺 Русский', GE: '🇬🇪 ქართული', EN: '🇬🇧 English' };
  const resources = (me.resources || []).map(r => `
    <div class="card tappable" onclick="${r.url ? `window.open('${escapeAttr(r.url)}','_blank')` : ''}">
      <div class="list-title" style="font-size:14px">🔗 ${escapeHtml(r.title)}</div>
      ${r.url ? `<div class="list-sub">${escapeHtml(r.url)}</div>` : ''}
    </div>`).join('');
  document.getElementById('profileBody').innerHTML = `
    <div class="card">
      <div class="dog-card-head">
        <div class="avatar">${p.moderator ? '🛡' : '🐾'}</div>
        <div>
          <div class="list-title">${escapeHtml(p.name || '—')}</div>
          <div class="list-sub">${escapeHtml(p.username || '')}${p.moderator ? ' · модератор' : ''}</div>
        </div>
      </div>
      <div class="info-row"><span>🏙 Город</span><b>${escapeHtml(p.city || '—')}</b></div>
      <div class="info-row"><span>📞 Телефон</span><b>${escapeHtml(p.tel || '—')}</b></div>
      <div class="info-row"><span>🌐 Язык бота</span><b>${langNames[p.lang] || p.lang}</b></div>
      <div class="info-row"><span>👁 Юзернейм в «Кто рядом?»</span><b>${p.showTg === 'Показан' ? 'показан' : 'скрыт'}</b></div>
      <div class="info-row"><span>🐕 Моих собак</span><b>${me.myDogsCount || 0}</b></div>
      <button class="pop-btn" style="margin-top:12px" onclick="openProfileEdit()">✏️ Редактировать</button>
    </div>

    <div class="sec-label">Действия</div>
    <div class="card tappable" onclick="showScreen('dogs'); dogSegment='mine'; renderDogSegments(); renderDogsScreen();">
      <div class="list-title" style="font-size:14px">🐕 Мои собаки</div>
      <div class="list-sub">анкеты, геопозиция, редактирование</div>
    </div>
    <div class="card tappable" onclick="openBotDeepLink('')">
      <div class="list-title" style="font-size:14px">🤖 Открыть бота</div>
      <div class="list-sub">фото собак, «Кто рядом?», поддержка проекта</div>
    </div>

    ${resources ? `<div class="sec-label">📚 Полезные материалы</div>${resources}` : ''}
  `;
}
function openProfileEdit() {
  const p = me.profile;
  const cities = me.cities || [];
  openSheet(`
    <h3>✏️ Профиль</h3>
    <div class="field"><label>Имя</label><input type="text" id="prName" value="${escapeAttr(p.name || '')}"></div>
    <div class="field"><label>Телефон</label><input type="tel" id="prTel" value="${escapeAttr(p.tel === 'Не указан' ? '' : (p.tel || ''))}" placeholder="+995…"></div>
    ${cities.length ? `<div class="field"><label>Город</label><select id="prCity">${selOpts(cities, p.city)}</select></div>` : ''}
    <div class="field"><label>Язык бота</label><select id="prLang">
      <option value="RU" ${p.lang === 'RU' ? 'selected' : ''}>🇷🇺 Русский</option>
      <option value="GE" ${p.lang === 'GE' ? 'selected' : ''}>🇬🇪 ქართული</option>
      <option value="EN" ${p.lang === 'EN' ? 'selected' : ''}>🇬🇧 English</option>
    </select></div>
    <div class="field field-row">
      <input type="checkbox" id="prShowTg" ${p.showTg === 'Показан' ? 'checked' : ''}>
      <label style="margin:0">Показывать мой юзернейм в «Кто рядом?»</label>
    </div>
    <button class="pop-btn" onclick="submitProfileEdit()">Сохранить</button>
  `);
}
async function submitProfileEdit() {
  const cityEl = document.getElementById('prCity');
  const res = await callApi('updateProfile', { changes: {
    name: document.getElementById('prName').value,
    tel: document.getElementById('prTel').value,
    city: cityEl ? cityEl.value : undefined,
    lang: document.getElementById('prLang').value,
    showTg: document.getElementById('prShowTg').checked ? 'Показан' : 'Скрыт'
  }});
  closeSheet();
  if (res.ok) { haptic(); me = null; loadProfile(true); setStatus('✅ Профиль обновлён', 2000); }
  else alert('Не получилось: ' + (res.error || ''));
}

// ================== СТАРТ ==================
(async function loadRefData() {
  try {
    const r = await fetch(`${API_URL}?type=breeds`); const j = await r.json();
    if (j.breeds && j.breeds.length) COMMON_BREEDS = j.breeds;
  } catch (e) {}
  try {
    const r2 = await fetch(`${API_URL}?type=regions`); const j2 = await r2.json();
    if (j2.regions && j2.regions.length) REGIONS_LIST = j2.regions;
  } catch (e) {}
})();

(function initFromQuery() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('layer') === 'lost') { activeTab = 'dogs'; subFilter = 'lost'; }
    if (params.get('screen')) showScreen(params.get('screen'));
  } catch (e) {}
})();

renderSubfilters();
renderLayer();
callApi('getMe', {}).then(res => { if (res.ok) me = res; });
</script>
