<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Собачники · Карта</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --paw:   #d9723a; --vet:   #2f8f7c; --shop:  #6b5fd1;
    --red: #d64545; --yellow: #e0a72e; --green: #4a9a5c; --grey: #9a9a9a;
    --bg:    var(--tg-theme-bg-color, #ffffff);
    --text:  var(--tg-theme-text-color, #111111);
    --hint:  var(--tg-theme-hint-color, #7a7a7a);
    --btnbg: var(--tg-theme-button-color, #d9723a);
    --btntx: var(--tg-theme-button-text-color, #ffffff);
    --card:  var(--tg-theme-secondary-bg-color, #f4f1ea);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #topbar { padding: 10px 12px 8px; background: var(--bg); z-index: 500; }
  #tabs { display: flex; gap: 6px; }
  .tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 12px; font-size: 13px; font-weight: 600;
    background: var(--card); color: var(--hint); transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer; user-select: none; }
  .tab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tab.active { color: #fff; }
  .tab[data-k="dogs"].active { background: var(--paw); }
  .tab[data-k="places"].active { background: var(--vet); }
  .tab[data-k="dogs"] .dot { background: var(--paw); }
  .tab[data-k="places"] .dot { background: var(--vet); }
  .tab.active .dot { background: #fff; }
  #subfilters { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 2px; }
  #subfilters::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; font-size: 12px; padding: 6px 11px; border-radius: 999px; background: var(--card);
    color: var(--hint); cursor: pointer; user-select: none; }
  .chip.active { background: var(--text); color: var(--bg); }
  #map { flex: 1; position: relative; }
  .leaflet-popup-content-wrapper { border-radius: 14px; }
  .leaflet-popup-content { margin: 12px 14px; font-size: 13.5px; line-height: 1.45; width: 240px !important; }
  .pop-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .pop-row { color: #555; }
  .pop-badges { margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #eee; color: #444; }
  .badge.warn { background: #fde3e3; color: #a33; }
  .pop-actions { margin-top: 9px; display: flex; flex-direction: column; gap: 6px; }
  .pop-btn { border: none; border-radius: 10px; padding: 8px 10px; font-size: 12.5px; font-weight: 600;
    background: var(--btnbg); color: var(--btntx); cursor: pointer; }
  .pop-btn.secondary { background: #eee; color: #333; }
  .stars { cursor: pointer; font-size: 18px; letter-spacing: 2px; }
  .marker-pin { width: 26px; height: 26px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.35); border: 2px solid #fff; }
  .marker-pin span { transform: rotate(45deg); font-size: 13px; }
  .marker-pin.lost { animation: pulse 1.4s infinite; box-shadow: 0 0 0 0 rgba(214,69,69,.6); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(214,69,69,.55);} 70% { box-shadow: 0 0 0 12px rgba(214,69,69,0);} 100% { box-shadow: 0 0 0 0 rgba(214,69,69,0);} }
  .marker-pin.closed { opacity: .45; }
  #status { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 600;
    background: var(--card); color: var(--hint); font-size: 12.5px; padding: 6px 14px; border-radius: 999px;
    box-shadow: 0 2px 8px rgba(0,0,0,.12); pointer-events: none; opacity: 0; transition: opacity .2s ease; }
  #status.show { opacity: 1; }
  #count-badge { position: absolute; bottom: 14px; left: 14px; z-index: 500; background: var(--card); color: var(--text);
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  #fab { position: absolute; bottom: 14px; right: 14px; z-index: 500; width: 48px; height: 48px; border-radius: 50%;
    background: var(--btnbg); color: var(--btntx); border: none; font-size: 24px; box-shadow: 0 3px 10px rgba(0,0,0,.25);
    cursor: pointer; display: none; align-items: center; justify-content: center; }
  #fab.show { display: flex; }

  /* ---- Форма (добавление места / отзыв / уточнение данных) ---- */
  #sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 900; display: none; }
  #sheet-overlay.show { display: block; }
  #sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--bg); border-radius: 18px 18px 0 0;
    z-index: 901; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); transform: translateY(100%);
    transition: transform .22s ease; max-height: 80vh; overflow-y: auto; }
  #sheet.show { transform: translateY(0); }
  #sheet h3 { margin: 0 0 12px; font-size: 16px; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--hint); display: block; margin-bottom: 4px; }
  .field input[type=text], .field input[type=tel], .field textarea {
    width: 100%; padding: 9px 10px; border-radius: 10px; border: 1px solid #ddd; background: var(--card);
    color: var(--text); font-size: 14px; font-family: inherit; }
  .field textarea { resize: vertical; min-height: 60px; }
  .field-row { display: flex; align-items: center; gap: 8px; }
  #sheet .pop-btn { width: 100%; padding: 11px; font-size: 14px; margin-top: 4px; }
  #geo-status { font-size: 12px; color: var(--hint); margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tabs">
      <div class="tab active" data-k="dogs"><span class="dot"></span>Собаки</div>
      <div class="tab" data-k="places"><span class="dot"></span>Места</div>
    </div>
    <div id="subfilters"></div>
  </div>
  <div id="map">
    <div id="status">Загружаю…</div>
    <div id="count-badge">—</div>
    <button id="fab">+</button>
  </div>
</div>

<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet"></div>

<script>
  // URL рабочего деплоя Apps Script (Manage deployments → тот же URL, что и вебхук бота)
  const API_URL = "https://script.google.com/macros/s/AKfycbwuaKkog3Ebjowds_pE4SmxjS63UIlZseNE-NE48KQSYLmNas3gkAqCS1p7TM-0tv1r/exec";
  const BOT_USERNAME = "ВАШ_БОТ_USERNAME";

  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const TBILISI_CENTER = [41.7151, 44.8271];
  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(TBILISI_CENTER, 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  let currentLayer = L.layerGroup().addTo(map);
  let dataCache = { dogs: null, places: null };
  let activeTab = 'dogs';
  let subFilter = 'all';

  // Типы мест: токен → {label, иконка}. Совпадает с сервером (PLACE_TYPE_LABELS).
  const PLACE_TYPES = {
    Clinics: { label: 'Ветклиника', icon: '🏥' },
    Shops:   { label: 'Зоомагазин', icon: '🏪' },
    Park:    { label: 'Площадка',   icon: '🌳' },
    Cafe:    { label: 'Кафе',       icon: '☕' },
    Rest:    { label: 'Ресторан',   icon: '🍽' },
    Other:   { label: 'Другое',     icon: '📍' }
  };

  const ICONS = { dogs: '🐕', places: '📍' };
  const COLOR_VARS = { dogs: '--paw' };

  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  function ratingColor(rating) {
    if (rating == null) return cssVar('--grey');
    if (rating < 3) return cssVar('--red');
    if (rating < 4) return cssVar('--yellow');
    return cssVar('--green');
  }

  function pinIcon(kind, item) {
    let cls = 'marker-pin';
    let color, emoji;
    if (kind === 'dogs') {
      color = cssVar(COLOR_VARS.dogs);
      if (item.lost) { cls += ' lost'; }
      emoji = item.lost ? '🚨' : ICONS.dogs;
    } else {
      // Места: цвет метки = рейтинг (серый — без оценок), эмодзи = тип места
      color = ratingColor(item.rating);
      if (item.closed) cls += ' closed';
      emoji = (PLACE_TYPES[item.type] || PLACE_TYPES.Other).icon;
    }
    return L.divIcon({
      className: '', html: `<div class="${cls}" style="background:${color}"><span>${emoji}</span></div>`,
      iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -24]
    });
  }

  function setStatus(text) {
    const el = document.getElementById('status');
    if (!text) { el.classList.remove('show'); return; }
    el.textContent = text; el.classList.add('show');
  }

  const SUBFILTERS = {
    dogs: [['all','Все'], ['home','Домашние'], ['street','Уличные']],
    places: [['all','Все'], ['Clinics','🏥'], ['Shops','🏪'], ['Park','🌳'], ['Cafe','☕'], ['Rest','🍽'], ['Other','📍']]
  };

  function renderSubfilters() {
    const box = document.getElementById('subfilters');
    box.innerHTML = '';
    SUBFILTERS[activeTab].forEach(([k, label]) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (subFilter === k ? ' active' : '');
      chip.textContent = label;
      chip.onclick = () => { subFilter = k; renderSubfilters(); renderLayer(); };
      box.appendChild(chip);
    });
    // Кнопка «+» показывается на вкладке мест (добавить место)
    document.getElementById('fab').classList.toggle('show', activeTab === 'places');
  }

  async function loadData(kind, force) {
    if (dataCache[kind] && !force) return dataCache[kind];
    setStatus('Загружаю…');
    try {
      const uid = (kind === 'dogs' && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : '';
      const res = await fetch(`${API_URL}?type=${kind}${uid ? '&uid=' + uid : ''}`);
      const json = await res.json();
      dataCache[kind] = json[kind] || [];
    } catch (err) {
      dataCache[kind] = [];
      setStatus('Не получилось загрузить данные 😔');
      setTimeout(() => setStatus(null), 2500);
    }
    return dataCache[kind];
  }

  function filterDogs(list) {
    if (subFilter === 'home') return list.filter(d => d.status === 'У владельца' || d.status === 'У опекуна');
    if (subFilter === 'street') return list.filter(d => d.status === 'Уличная' || d.status === 'Потеряна');
    return list;
  }
  function filterPlaces(list) {
    if (subFilter === 'all') return list;
    return list.filter(p => (p.type || 'Other') === subFilter);
  }

  function dogPopupHtml(d) {
    const badges = [
      d.sex ? `<span class="badge">${d.sex}</span>` : '',
      d.seekingHome ? `<span class="badge">🏡 ищет дом</span>` : '',
      d.isDonor ? `<span class="badge">🩸 донор</span>` : '',
      d.sterilized === 'Да' ? `<span class="badge">🏥 стерилизован</span>` : '',
      d.lost ? `<span class="badge warn">🚨 потерялась${d.lostDaysAgo != null ? ' · ' + d.lostDaysAgo + ' дн.' : ''}</span>` : '',
      !d.exactLocation && !d.lost ? `<span class="badge">≈ примерно район</span>` : ''
    ].join('');
    return `<div class="pop-title">${escapeHtml(d.name)}</div>
      <div class="pop-row">${escapeHtml(d.breed || 'порода не указана')} · ${escapeHtml(d.age || '—')}</div>
      <div class="pop-row">${escapeHtml(d.status)} · ${escapeHtml(d.region || d.city)}</div>
      <div class="pop-badges">${badges}</div>
      <div class="pop-actions">
        ${d.mine && (d.status === 'У владельца')
          ? `<button class="pop-btn" onclick="walkHereMine('${d.id}')">📍 Гуляем тут</button>`
          : (d.hasOwner && !d.mine ? `<button class="pop-btn" onclick="contactOwner('${d.id}')">✍️ Написать хозяину</button>` : '')}
      </div>`;
  }

  function placePopupHtml(p) {
    const tinfo = PLACE_TYPES[p.type] || PLACE_TYPES.Other;
    const stars = p.rating != null ? '⭐'.repeat(Math.round(p.rating)) + ` ${p.rating} (${p.ratingCount})` : 'пока без отзывов';
    return `<div class="pop-title">${tinfo.icon} ${escapeHtml(p.name)}</div>
      <div class="pop-row">🏷 ${escapeHtml(p.typeLabel || tinfo.label)}</div>
      <div class="pop-row">${escapeHtml(p.address || '')}</div>
      <div class="pop-row">${escapeHtml(p.phone || '')}</div>
      <div class="pop-row">${stars}</div>
      <div class="pop-badges">
        ${p.night ? '<span class="badge">🌙 круглосуточно</span>' : ''}
        ${p.closed ? '<span class="badge warn">⛔ не работает</span>' : ''}
      </div>
      <div class="pop-actions">
        <button class="pop-btn" onclick="openReviewSheet('${p.id}','${escapeAttr(p.name)}')">⭐ Оставить отзыв</button>
        <button class="pop-btn secondary" onclick="openSuggestSheet('${p.id}','${escapeAttr(p.name)}',${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️ Уточнить данные</button>
      </div>`;
  }

  function escapeHtml(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }

  async function renderLayer() {
    const kind = activeTab;
    const raw = await loadData(kind);
    setStatus(null);
    let list = kind === 'dogs' ? filterDogs(raw) : filterPlaces(raw);

    currentLayer.clearLayers();
    list.forEach(item => {
      if (!item.lat || !item.lng) return;
      const marker = L.marker([item.lat, item.lng], { icon: pinIcon(kind, item) });
      marker.bindPopup(kind === 'dogs' ? dogPopupHtml(item) : placePopupHtml(item));
      currentLayer.addLayer(marker);
    });
    const label = kind === 'dogs' ? 'собак' : 'мест';
    document.getElementById('count-badge').textContent = `${ICONS[kind]} ${list.length} ${label}`;
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.k;
      subFilter = 'all';
      renderSubfilters();
      renderLayer();
    };
  });

  // ---------- Диплинки в бот (контакт с хозяином, уточнение геопозиции) — п.7 ТЗ ----------
  function openBotDeepLink(payload) {
    const url = `https://t.me/${BOT_USERNAME}?start=${payload}`;
    if (tg && tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url, '_blank');
  }
  function contactOwner(dogId) { openBotDeepLink('contact_' + dogId); }

  // «Гуляем тут» — п.3 ТЗ: геопозиция ставится ВСЕМ собакам владельца в его городе.
  // Сначала пробуем прямо из мини-аппа (геолокация браузера + walkHere API),
  // если не вышло — открываем бота с диплинком walk_<id>, там можно отправить геометку вручную.
  function walkHereMine(dogId) {
    if (!navigator.geolocation) { openBotDeepLink('walk_' + dogId); return; }
    setStatus('📍 Определяю местоположение…');
    navigator.geolocation.getCurrentPosition(async pos => {
      setStatus('Обновляю точку…');
      const res = await callApi('walkHere', { lat: pos.coords.latitude, lng: pos.coords.longitude });
      if (res.ok) {
        map.closePopup();
        dataCache.dogs = null;
        await renderLayer();
        setStatus('✅ Точка на карте обновлена');
        setTimeout(() => setStatus(null), 2200);
      } else {
        setStatus(null);
        openBotDeepLink('walk_' + dogId);
      }
    }, () => { setStatus(null); openBotDeepLink('walk_' + dogId); }, { enableHighAccuracy: true, timeout: 8000 });
  }

  // ---------- Нижний лист (форма) ----------
  function openSheet(html) {
    document.getElementById('sheet').innerHTML = html;
    document.getElementById('sheet-overlay').classList.add('show');
    document.getElementById('sheet').classList.add('show');
  }
  function closeSheet() {
    document.getElementById('sheet-overlay').classList.remove('show');
    document.getElementById('sheet').classList.remove('show');
  }

  async function callApi(action, payload) {
    const initData = tg ? tg.initData : '';
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action, initData, payload })
      });
      return await res.json();
    } catch (e) {
      return { ok: false, error: 'network' };
    }
  }

  // ---------- Отзыв + рейтинг (места) ----------
  function openReviewSheet(id, name) {
    let rating = 0;
    openSheet(`
      <h3>Отзыв о месте «${escapeHtml(name)}»</h3>
      <div class="field">
        <label>Оценка</label>
        <div class="stars" id="starsPick">☆☆☆☆☆</div>
      </div>
      <div class="field"><textarea id="reviewText" placeholder="Коротко о впечатлениях (необязательно)"></textarea></div>
      <button class="pop-btn" onclick="submitReview('${id}')">Отправить</button>
    `);
    const starsEl = document.getElementById('starsPick');
    starsEl.onclick = (e) => {
      const rect = starsEl.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      rating = Math.max(1, Math.min(5, Math.ceil(pct * 5)));
      starsEl.textContent = '⭐'.repeat(rating) + '☆'.repeat(5 - rating);
      starsEl.dataset.rating = rating;
    };
  }
  async function submitReview(id) {
    const rating = parseInt(document.getElementById('starsPick').dataset.rating || '0', 10);
    if (!rating) { alert('Поставь оценку от 1 до 5 ⭐'); return; }
    const text = document.getElementById('reviewText').value;
    const res = await callApi('addReview', { type: 'Places', id, rating, text });
    closeSheet();
    if (res.ok) { dataCache.places = null; renderLayer(); } else { alert('Не получилось: ' + (res.error || '')); }
  }

  // ---------- Уточнить данные места / удалить → на модерацию ----------
  function openSuggestSheet(id, name, current) {
    const typeOpts = Object.keys(PLACE_TYPES).map(tk =>
      `<option value="${PLACE_TYPES[tk].label}" ${current.typeLabel === PLACE_TYPES[tk].label ? 'selected' : ''}>${PLACE_TYPES[tk].icon} ${PLACE_TYPES[tk].label}</option>`
    ).join('');
    openSheet(`
      <h3>Уточнить данные — «${escapeHtml(name)}»</h3>
      <div class="field"><label>Название</label><input type="text" id="sugName" value="${escapeAttr(current.name || name)}"></div>
      <div class="field"><label>Тип места</label><select id="sugType" style="width:100%;padding:9px 10px;border-radius:10px;border:1px solid #ddd;background:var(--card);color:var(--text);font-size:14px;">${typeOpts}</select></div>
      <div class="field"><label>Адрес</label><input type="text" id="sugAddress" value="${escapeAttr(current.address || '')}"></div>
      <div class="field"><label>Телефон</label><input type="tel" id="sugPhone" value="${escapeAttr(current.phone || '')}"></div>
      <div class="field field-row"><input type="checkbox" id="sugNight" ${current.night ? 'checked' : ''}><label style="margin:0">Круглосуточно</label></div>
      <div class="field field-row"><input type="checkbox" id="sugClosed" ${current.closed ? 'checked' : ''}><label style="margin:0">Сейчас не работает</label></div>
      <button class="pop-btn secondary" onclick="useMyLocationFor('sug')">📍 Обновить геометку по моей текущей позиции</button>
      <div id="geo-status"></div>
      <button class="pop-btn" onclick="submitSuggest('${id}')">Отправить на проверку</button>
      <button class="pop-btn" style="background:#d64545;margin-top:8px" onclick="submitDelete('${id}','${escapeAttr(name)}')">🗑️ Предложить удалить место</button>
    `);
  }
  let pendingGeo = null;
  function useMyLocationFor(prefix) {
    const st = document.getElementById('geo-status');
    st.textContent = 'Определяю местоположение…';
    navigator.geolocation.getCurrentPosition(
      pos => { pendingGeo = { lat: pos.coords.latitude, lng: pos.coords.longitude }; st.textContent = '✅ Геометка получена'; },
      err => { st.textContent = 'Не удалось получить геолокацию: ' + err.message; },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }
  async function submitSuggest(id) {
    const changes = {
      name: document.getElementById('sugName').value,
      type: document.getElementById('sugType').value,
      address: document.getElementById('sugAddress').value,
      phone: document.getElementById('sugPhone').value,
      night: document.getElementById('sugNight').checked,
      closed: document.getElementById('sugClosed').checked
    };
    if (pendingGeo) changes.mapsLink = `https://www.google.com/maps?q=${pendingGeo.lat},${pendingGeo.lng}`;
    const res = await callApi('suggestEdit', { type: 'Places', id, changes });
    pendingGeo = null;
    closeSheet();
    alert(res.ok ? 'Спасибо! Отправлено модератору на проверку.' : 'Не получилось: ' + (res.error || ''));
  }
  async function submitDelete(id, name) {
    if (!confirm(`Предложить удалить «${name}»? Место скроется после подтверждения модератором.`)) return;
    const res = await callApi('suggestEdit', { type: 'Places', id, changes: { _delete: true } });
    closeSheet();
    alert(res.ok ? 'Спасибо! Запрос на удаление отправлен модератору.' : 'Не получилось: ' + (res.error || ''));
  }

  // ---------- Добавить место (кнопка "+") ----------
  document.getElementById('fab').onclick = () => {
    const typeOpts = Object.keys(PLACE_TYPES).map(tk =>
      `<option value="${tk}" ${(subFilter !== 'all' && subFilter === tk) ? 'selected' : ''}>${PLACE_TYPES[tk].icon} ${PLACE_TYPES[tk].label}</option>`
    ).join('');
    openSheet(`
      <h3>Добавить место</h3>
      <div class="field"><label>Тип места</label><select id="addType" style="width:100%;padding:9px 10px;border-radius:10px;border:1px solid #ddd;background:var(--card);color:var(--text);font-size:14px;">${typeOpts}</select></div>
      <div class="field"><label>Название</label><input type="text" id="addName" placeholder="Название"></div>
      <div class="field"><label>Адрес</label><input type="text" id="addAddress" placeholder="Улица, дом"></div>
      <div class="field"><label>Телефон</label><input type="tel" id="addPhone" placeholder="+995..."></div>
      <div class="field field-row"><input type="checkbox" id="addNight"><label style="margin:0">Круглосуточно</label></div>
      <button class="pop-btn secondary" onclick="useMyLocationFor('add')">📍 Отметить моей текущей геопозицией</button>
      <div id="geo-status"></div>
      <button class="pop-btn" onclick="submitAddPlace()">Отправить на модерацию</button>
    `);
  };
  async function submitAddPlace() {
    const name = document.getElementById('addName').value.trim();
    if (!name) { alert('Укажи название'); return; }
    const payload = {
      type: document.getElementById('addType').value,
      name,
      address: document.getElementById('addAddress').value,
      phone: document.getElementById('addPhone').value,
      night: document.getElementById('addNight').checked
    };
    if (pendingGeo) { payload.lat = pendingGeo.lat; payload.lng = pendingGeo.lng; }
    const res = await callApi('addPlace', payload);
    pendingGeo = null;
    closeSheet();
    if (res.ok) { alert('Спасибо! Появится на карте после проверки модератором.'); }
    else alert('Не получилось: ' + (res.error || ''));
  }

  renderSubfilters();
  renderLayer();
</script>
</body>
</html>
