<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Собачники · Карта</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --paw:   #d9723a; /* собаки — тёплый терракот */
    --vet:   #2f8f7c; /* клиники — приглушённый teal */
    --shop:  #6b5fd1; /* магазины — мягкий фиолет */
    --bg:    var(--tg-theme-bg-color, #ffffff);
    --text:  var(--tg-theme-text-color, #111111);
    --hint:  var(--tg-theme-hint-color, #7a7a7a);
    --btnbg: var(--tg-theme-button-color, #d9723a);
    --btntx: var(--tg-theme-button-text-color, #ffffff);
    --card:  var(--tg-theme-secondary-bg-color, #f4f1ea);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- Верхняя панель с фильтрами ---- */
  #topbar { padding: 10px 12px 8px; background: var(--bg); z-index: 500; }
  #tabs { display: flex; gap: 6px; }
  .tab {
    flex: 1; text-align: center; padding: 9px 4px; border-radius: 12px; font-size: 13px; font-weight: 600;
    background: var(--card); color: var(--hint); border: 1.5px solid transparent; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer; user-select: none;
  }
  .tab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tab.active { color: #fff; }
  .tab[data-k="dogs"].active { background: var(--paw); }
  .tab[data-k="clinics"].active { background: var(--vet); }
  .tab[data-k="shops"].active { background: var(--shop); }
  .tab[data-k="dogs"] .dot { background: var(--paw); }
  .tab[data-k="clinics"] .dot { background: var(--vet); }
  .tab[data-k="shops"] .dot { background: var(--shop); }
  .tab.active .dot { background: #fff; }

  #subfilters { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 2px; }
  #subfilters::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap; font-size: 12px; padding: 6px 11px; border-radius: 999px; background: var(--card);
    color: var(--hint); border: 1px solid transparent; cursor: pointer; user-select: none;
  }
  .chip.active { background: var(--text); color: var(--bg); }

  /* ---- Карта ---- */
  #map { flex: 1; position: relative; }
  .leaflet-popup-content-wrapper { border-radius: 14px; }
  .leaflet-popup-content { margin: 12px 14px; font-size: 13.5px; line-height: 1.45; }
  .pop-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .pop-row { color: #555; }
  .pop-badges { margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #eee; color: #444; }

  /* ---- Маркеры ---- */
  .marker-pin {
    width: 26px; height: 26px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.35);
    border: 2px solid #fff;
  }
  .marker-pin span { transform: rotate(45deg); font-size: 13px; }

  /* ---- Пустое состояние / загрузка ---- */
  #status {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 600;
    background: var(--card); color: var(--hint); font-size: 12.5px; padding: 6px 14px; border-radius: 999px;
    box-shadow: 0 2px 8px rgba(0,0,0,.12); pointer-events: none; opacity: 0; transition: opacity .2s ease;
  }
  #status.show { opacity: 1; }

  #count-badge {
    position: absolute; bottom: 14px; left: 14px; z-index: 500; background: var(--card); color: var(--text);
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tabs">
      <div class="tab active" data-k="dogs"><span class="dot"></span>Собаки</div>
      <div class="tab" data-k="clinics"><span class="dot"></span>Клиники</div>
      <div class="tab" data-k="shops"><span class="dot"></span>Магазины</div>
    </div>
    <div id="subfilters"></div>
  </div>
  <div id="map">
    <div id="status">Загружаю…</div>
    <div id="count-badge">—</div>
  </div>
</div>

<script>
  // ЗАПОЛНИ ЭТИМ URL СВОЕГО ДЕПЛОЯ APPS SCRIPT (Deploy → New deployment → Web app),
  // тот же проект, где живёт dog_bot.gs — там уже есть функция doGet для этого.
  const API_URL = "https://script.google.com/macros/s/AKfycbwXeDHG69VD9Sn1pDkaJLASfgjUPZHYON7kVjcGIIj3Gyx_Wc5vWhzaADvqy9ZUd1cq/exec";

  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const TBILISI_CENTER = [41.7151, 44.8271];
  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(TBILISI_CENTER, 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  let currentLayer = L.layerGroup().addTo(map);
  let dataCache = { dogs: null, clinics: null, shops: null };
  let activeTab = 'dogs';
  let subFilter = 'all'; // dogs: all|home|street|seeking|donor · clinics/shops: all|night

  const ICONS = {
    dogs:    { color: 'var(--paw)',  emoji: '🐕' },
    clinics: { color: 'var(--vet)',  emoji: '🏥' },
    shops:   { color: 'var(--shop)', emoji: '🛒' }
  };

  function pinIcon(kind) {
    const c = getComputedStyle(document.documentElement).getPropertyValue(kind === 'dogs' ? '--paw' : kind === 'clinics' ? '--vet' : '--shop');
    return L.divIcon({
      className: '', html: `<div class="marker-pin" style="background:${c.trim() || '#d9723a'}"><span>${ICONS[kind].emoji}</span></div>`,
      iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -24]
    });
  }

  function setStatus(text) {
    const el = document.getElementById('status');
    if (!text) { el.classList.remove('show'); return; }
    el.textContent = text; el.classList.add('show');
  }

  const SUBFILTERS = {
    dogs:    [['all','Все'], ['home','Домашние'], ['street','Уличные'], ['seeking','Ищут дом'], ['donor','Доноры']],
    clinics: [['all','Все'], ['night','Круглосуточно']],
    shops:   [['all','Все'], ['night','Круглосуточно']]
  };

  function renderSubfilters() {
    const box = document.getElementById('subfilters');
    box.innerHTML = '';
    SUBFILTERS[activeTab].forEach(([k, label]) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (subFilter === k ? ' active' : '');
      chip.textContent = label;
      chip.onclick = () => { subFilter = k; renderSubfilters(); renderLayer(); };
      box.appendChild(chip);
    });
  }

  async function loadData(kind) {
    if (dataCache[kind]) return dataCache[kind];
    setStatus('Загружаю…');
    try {
      const res = await fetch(`${API_URL}?type=${kind}`);
      const json = await res.json();
      dataCache[kind] = json[kind] || [];
    } catch (err) {
      dataCache[kind] = [];
      setStatus('Не получилось загрузить данные 😔');
      setTimeout(() => setStatus(null), 2500);
    }
    return dataCache[kind];
  }

  function dogPopup(d) {
    const badges = [
      d.sex ? `<span class="badge">${d.sex}</span>` : '',
      d.seekingHome ? `<span class="badge">🏡 ищет дом</span>` : '',
      d.isDonor ? `<span class="badge">🩸 донор</span>` : '',
      d.sterilized === 'Да' ? `<span class="badge">🏥 стерилизован</span>` : ''
    ].join('');
    return `<div class="pop-title">${d.name}</div>
      <div class="pop-row">${d.breed || 'порода не указана'} · ${d.age || '—'}</div>
      <div class="pop-row">${d.status} · ${d.region || d.city}</div>
      <div class="pop-badges">${badges}</div>`;
  }
  function placePopup(p, kind) {
    return `<div class="pop-title">${ICONS[kind].emoji} ${p.name}</div>
      <div class="pop-row">${p.address || ''}</div>
      <div class="pop-row">${p.phone || ''}</div>
      <div class="pop-badges">
        ${p.night ? '<span class="badge">🌙 круглосуточно</span>' : ''}
        ${p.rating ? `<span class="badge">⭐ ${p.rating}</span>` : ''}
      </div>`;
  }

  function filterDogs(list) {
    if (subFilter === 'all') return list;
    if (subFilter === 'home') return list.filter(d => d.status === 'У владельца' || d.status === 'У опекуна');
    if (subFilter === 'street') return list.filter(d => d.status === 'Уличная');
    if (subFilter === 'seeking') return list.filter(d => d.seekingHome);
    if (subFilter === 'donor') return list.filter(d => d.isDonor);
    return list;
  }
  function filterPlaces(list) {
    if (subFilter === 'night') return list.filter(p => p.night);
    return list;
  }

  async function renderLayer() {
    const kind = activeTab;
    const raw = await loadData(kind);
    setStatus(null);
    let list = kind === 'dogs' ? filterDogs(raw) : filterPlaces(raw);

    currentLayer.clearLayers();
    const icon = pinIcon(kind);
    list.forEach(item => {
      if (!item.lat || !item.lng) return;
      const marker = L.marker([item.lat, item.lng], { icon });
      marker.bindPopup(kind === 'dogs' ? dogPopup(item) : placePopup(item, kind));
      currentLayer.addLayer(marker);
    });
    document.getElementById('count-badge').textContent =
      `${ICONS[kind].emoji} ${list.length} ${kind === 'dogs' ? 'собак' : kind === 'clinics' ? 'клиник' : 'магазинов'}`;
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.k;
      subFilter = 'all';
      renderSubfilters();
      renderLayer();
    };
  });

  renderSubfilters();
  renderLayer();
</script>
</body>
</html>
